<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600" role="img" aria-labelledby="title desc">
  <title id="title">新竹縣地方創生輔導計畫推動策略結構圖</title>
  <desc id="desc">依據工作計畫書中計畫推動策略整理的層級結構圖。</desc>
  <defs>
    <style>
      .bg { fill: #f7f4ec; }
      .title { font: 700 44px "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif; fill: #20343b; }
      .subtitle { font: 500 22px "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif; fill: #5e6a6d; }
      .label { font: 700 24px "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif; fill: #ffffff; }
      .box-title { font: 700 26px "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif; fill: #20343b; }
      .box-text { font: 500 20px "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif; fill: #31464d; }
      .small { font: 500 18px "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif; fill: #385057; }
      .pill-text { font: 700 22px "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif; fill: #20343b; }
      .caption-title { font: 700 24px "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif; fill: #20343b; }
      .caption { font: 500 20px "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif; fill: #385057; }
      .soft-shadow { filter: drop-shadow(0 10px 18px rgba(35, 52, 58, .10)); }
      .arrow { stroke: #6f7f82; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .line { stroke: #bdc7c8; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#6f7f82"/>
    </marker>
    <linearGradient id="axisGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#245f73"/>
      <stop offset="1" stop-color="#3e8a64"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="1600" height="1600"/>
  <rect x="64" y="60" width="1472" height="1480" rx="30" fill="#fffdf8" stroke="#e0d8c8" stroke-width="2"/>

  <text x="800" y="128" text-anchor="middle" class="title">新竹縣地方創生輔導計畫</text>
  <text x="800" y="182" text-anchor="middle" class="title">計畫推動策略結構圖</text>
  <text x="800" y="228" text-anchor="middle" class="subtitle">核心架構深化為「串聯深化與落地優化」</text>
  <text x="800" y="260" text-anchor="middle" class="subtitle">以創生廊帶帶動跨鄉鎮合作與在地資源整合</text>

  <g class="soft-shadow">
    <rect x="110" y="330" width="330" height="150" rx="18" fill="#1f6f78"/>
    <text x="275" y="378" text-anchor="middle" class="label">核心架構</text>
    <text x="275" y="422" text-anchor="middle" class="label">廊帶推動</text>
    <text x="275" y="452" text-anchor="middle" class="label">資源整合｜共創行動</text>
  </g>

  <path class="arrow" d="M 440 405 C 490 405, 510 405, 560 405"/>

  <g class="soft-shadow">
    <rect x="560" y="330" width="480" height="150" rx="18" fill="#ffffff" stroke="#b9d0cc" stroke-width="3"/>
    <text x="800" y="388" text-anchor="middle" class="box-title">策略深化</text>
    <text x="800" y="432" text-anchor="middle" class="box-title">串聯深化與落地優化</text>
  </g>

  <path class="arrow" d="M 1040 405 C 1090 405, 1110 405, 1160 405"/>

  <g class="soft-shadow">
    <rect x="1160" y="330" width="330" height="150" rx="18" fill="#2f8a6d"/>
    <text x="1325" y="378" text-anchor="middle" class="label">總目標</text>
    <text x="1325" y="422" text-anchor="middle" class="label">推動新竹縣</text>
    <text x="1325" y="452" text-anchor="middle" class="label">地方創生發展</text>
  </g>

  <path class="arrow" d="M 800 480 L 800 545"/>

  <g class="soft-shadow">
    <rect x="250" y="545" width="1100" height="88" rx="24" fill="url(#axisGrad)"/>
    <text x="800" y="601" text-anchor="middle" class="label">主要推動軸線：創生廊帶</text>
  </g>

  <path class="line" d="M 800 633 L 800 690"/>
  <path class="line" d="M 335 690 L 1265 690"/>
  <path class="line" d="M 335 690 L 335 725"/>
  <path class="line" d="M 645 690 L 645 725"/>
  <path class="line" d="M 955 690 L 955 725"/>
  <path class="line" d="M 1265 690 L 1265 725"/>

  <g>
    <rect x="210" y="725" width="250" height="72" rx="18" fill="#e4f0ef" stroke="#a9c8c4" stroke-width="2"/>
    <text x="335" y="771" text-anchor="middle" class="pill-text">農業據點</text>
    <rect x="520" y="725" width="250" height="72" rx="18" fill="#e7efd9" stroke="#c0d19b" stroke-width="2"/>
    <text x="645" y="771" text-anchor="middle" class="pill-text">文化據點</text>
    <rect x="830" y="725" width="250" height="72" rx="18" fill="#e9eef5" stroke="#bac8d9" stroke-width="2"/>
    <text x="955" y="771" text-anchor="middle" class="pill-text">觀光據點</text>
    <rect x="1140" y="725" width="250" height="72" rx="18" fill="#f2e8d8" stroke="#d2b98d" stroke-width="2"/>
    <text x="1265" y="771" text-anchor="middle" class="pill-text">產業據點</text>
  </g>

  <path class="arrow" d="M 800 797 L 800 855"/>

  <g class="soft-shadow">
    <rect x="165" y="855" width="1270" height="160" rx="20" fill="#ffffff" stroke="#dfd6c7" stroke-width="2"/>
    <text x="800" y="905" text-anchor="middle" class="box-title">主題路徑規劃</text>
    <rect x="270" y="945" width="280" height="50" rx="25" fill="#f0d883"/>
    <text x="410" y="978" text-anchor="middle" class="pill-text">竹工藝</text>
    <rect x="660" y="945" width="280" height="50" rx="25" fill="#b7d6c0"/>
    <text x="800" y="978" text-anchor="middle" class="pill-text">客家農食</text>
    <rect x="1050" y="945" width="280" height="50" rx="25" fill="#a9cbdc"/>
    <text x="1190" y="978" text-anchor="middle" class="pill-text">山海生態</text>
  </g>

  <path class="arrow" d="M 800 1015 L 800 1070"/>

  <g>
    <rect x="120" y="1070" width="320" height="132" rx="16" fill="#f8fbfb" stroke="#c8d4d5" stroke-width="2"/>
    <text x="280" y="1112" text-anchor="middle" class="box-title">協力輔導</text>
    <text x="280" y="1150" text-anchor="middle" class="box-text">專業輔導團隊＋在地夥伴</text>
    <text x="280" y="1180" text-anchor="middle" class="small">客製陪伴、資源媒合</text>

    <rect x="470" y="1070" width="320" height="132" rx="16" fill="#f8fbfb" stroke="#c8d4d5" stroke-width="2"/>
    <text x="630" y="1112" text-anchor="middle" class="box-title">品牌與產品</text>
    <text x="630" y="1150" text-anchor="middle" class="box-text">特色廊帶品牌識別</text>
    <text x="630" y="1180" text-anchor="middle" class="small">產品開發、體驗遊程優化</text>

    <rect x="820" y="1070" width="320" height="132" rx="16" fill="#f8fbfb" stroke="#c8d4d5" stroke-width="2"/>
    <text x="980" y="1112" text-anchor="middle" class="box-title">交流共創</text>
    <text x="980" y="1150" text-anchor="middle" class="box-text">工作坊、訪視交流</text>
    <text x="980" y="1180" text-anchor="middle" class="small">跨域合作、網絡擴展</text>

    <rect x="1170" y="1070" width="320" height="132" rx="16" fill="#f8fbfb" stroke="#c8d4d5" stroke-width="2"/>
    <text x="1330" y="1112" text-anchor="middle" class="box-title">追蹤優化</text>
    <text x="1330" y="1150" text-anchor="middle" class="box-text">追蹤輔導與成效評估</text>
    <text x="1330" y="1180" text-anchor="middle" class="small">掌握執行、持續精進</text>
  </g>

  <path class="arrow" d="M 800 1202 L 800 1268"/>

  <g class="soft-shadow">
    <rect x="145" y="1268" width="1310" height="190" rx="20" fill="#ffffff" stroke="#dfd6c7" stroke-width="2"/>
    <text x="800" y="1320" text-anchor="middle" class="caption-title">成果與永續加值</text>
    <text x="800" y="1365" text-anchor="middle" class="caption">企業 ESG、數位導覽、永續發展概念</text>
    <text x="800" y="1408" text-anchor="middle" class="caption">地方品牌能見度與市場效益提升｜地方團隊經驗累積與創生網絡擴展</text>
    <text x="800" y="1451" text-anchor="middle" class="caption">打造地方創生生態博物館，形塑「生活即展覽」的地方體驗模式</text>
    <text x="800" y="1494" text-anchor="middle" class="caption">推動地方經濟、文化傳承與環境共榮</text>
  </g>
</svg>
